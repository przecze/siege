services:
  # Production build served by nginx, meant for ansible deployments.
  site:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    networks:
      - nginx-proxy
    #ports: ["127.0.0.1:8000:80"]
    environment:
      VIRTUAL_HOST: siege.janczechowski.com
      LETSENCRYPT_HOST: siege.janczechowski.com
      DEV_MODE: "false"
      NGINX_ENVSUBST_FILTER: DEV_MODE
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
    restart: unless-stopped

  # Vite dev server
  game:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.js:/app/vite.config.js
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000 --strictPort false
    environment:
      - NODE_ENV=development
    profiles:
      - dev
    restart: unless-stopped

  # Dev nginx reverse proxy in front of Vite
  nginx-dev:
    image: nginx:alpine
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    environment:
      - DEV_MODE=true
      - NGINX_ENVSUBST_FILTER=DEV_MODE
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx
    depends_on:
      - game
    ports:
      - 127.0.0.1:8000:80
    profiles:
      - dev
    restart: unless-stopped

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      - BASE_URL=http://nginx-dev:80
    depends_on:
      - nginx-dev
    profiles:
      - test

  assets:
    build:
      context: .
      dockerfile: Dockerfile.assets
    volumes:
      - ./assets:/assets
      - ./public/assets/units:/app/public/assets/units
    working_dir: /assets
    command: uv run prepare.py
    profiles:
      - tools

networks:
  nginx-proxy:
    external: true
