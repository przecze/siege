version: '3.9'
services:
  game:
    build: .
    ports:
      - '9449:8080'
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      VIRTUAL_HOST: siege.janczechowski.com
      VIRTUAL_PORT: 8080
      LETSENCRYPT_HOST: siege.janczechowski.com
    networks:
      - nginx-proxy
networks:
  nginx-proxy:
    external: true
