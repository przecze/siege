services:
  game:
    build: .
    ports:
      - '127.0.0.1:8000:8000'
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      VIRTUAL_HOST: siege.janczechowski.com
      VIRTUAL_PORT: 8080
      LETSENCRYPT_HOST: siege.janczechowski.com
    networks:
      - nginx-proxy
      - default

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      - BASE_URL=http://game:8000
    profiles:
      - test

networks:
  nginx-proxy:
    external: true
