<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000a14"/>
      <stop offset="70%" stop-color="#001122"/>
      <stop offset="100%" stop-color="#001d36"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1f0a"/>
      <stop offset="100%" stop-color="#060d05"/>
    </linearGradient>
    <radialGradient id="moon-glow" cx="70%" cy="20%" r="20%">
      <stop offset="0%" stop-color="#334466" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#001122" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fog" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001d36" stop-opacity="0"/>
      <stop offset="100%" stop-color="#001122" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
    </radialGradient>
    <pattern id="faint-grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#002244" stroke-width="0.4" stroke-opacity="0.4"/>
    </pattern>
    <!-- Stone texture for castles -->
    <pattern id="stone" x="0" y="0" width="20" height="16" patternUnits="userSpaceOnUse">
      <rect width="20" height="16" fill="#1a1a2e"/>
      <rect x="0" y="0" width="9" height="7" fill="#1e1e32" stroke="#0d0d1f" stroke-width="0.5"/>
      <rect x="11" y="0" width="9" height="7" fill="#1c1c30" stroke="#0d0d1f" stroke-width="0.5"/>
      <rect x="5" y="9" width="9" height="7" fill="#1e1e32" stroke="#0d0d1f" stroke-width="0.5"/>
    </pattern>
    <pattern id="stone-dark" x="0" y="0" width="20" height="16" patternUnits="userSpaceOnUse">
      <rect width="20" height="16" fill="#111120"/>
      <rect x="0" y="0" width="9" height="7" fill="#141422" stroke="#080810" stroke-width="0.5"/>
      <rect x="11" y="0" width="9" height="7" fill="#131320" stroke="#080810" stroke-width="0.5"/>
      <rect x="5" y="9" width="9" height="7" fill="#141422" stroke="#080810" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#sky)"/>
  <rect width="800" height="500" fill="url(#faint-grid)" opacity="0.6"/>
  <rect width="800" height="500" fill="url(#moon-glow)"/>

  <!-- Stars -->
  <g fill="#99aabb" opacity="0.65">
    <circle cx="42"  cy="28"  r="0.8"/><circle cx="98"  cy="15"  r="0.6"/><circle cx="155" cy="40"  r="0.9"/>
    <circle cx="210" cy="22"  r="0.7"/><circle cx="278" cy="10"  r="0.6"/><circle cx="340" cy="35"  r="0.8"/>
    <circle cx="390" cy="12"  r="0.5"/><circle cx="450" cy="30"  r="0.9"/><circle cx="510" cy="18"  r="0.7"/>
    <circle cx="570" cy="42"  r="0.6"/><circle cx="630" cy="8"   r="0.8"/><circle cx="690" cy="25"  r="0.9"/>
    <circle cx="740" cy="14"  r="0.6"/><circle cx="780" cy="38"  r="0.7"/>
    <circle cx="70"  cy="60"  r="0.5"/><circle cx="130" cy="72"  r="0.6"/><circle cx="200" cy="55"  r="0.8"/>
    <circle cx="260" cy="80"  r="0.5"/><circle cx="320" cy="65"  r="0.7"/><circle cx="480" cy="70"  r="0.6"/>
    <circle cx="545" cy="55"  r="0.8"/><circle cx="610" cy="78"  r="0.5"/><circle cx="665" cy="50"  r="0.7"/>
    <circle cx="760" cy="85"  r="0.8"/><circle cx="410" cy="88"  r="0.6"/><circle cx="170" cy="100" r="0.5"/>
    <circle cx="510" cy="110" r="0.7"/><circle cx="680" cy="95"  r="0.6"/>
  </g>

  <!-- Distant hills -->
  <path d="M0,420 L80,360 L160,395 L240,345 L320,378 L400,330 L480,370 L560,340 L640,375 L720,350 L800,368 L800,430 L0,430 Z"
        fill="#001629" opacity="0.85"/>
  <path d="M0,450 L100,405 L200,435 L300,395 L400,420 L500,400 L600,425 L700,405 L800,428 L800,460 L0,460 Z"
        fill="#010f1e" opacity="0.9"/>

  <!-- Fog over horizon -->
  <rect x="0" y="420" width="800" height="80" fill="url(#fog)"/>

  <!-- Ground — units run at y=500 -->
  <rect x="0" y="500" width="800" height="100" fill="url(#ground)"/>

  <!-- Ground top edge highlight -->
  <line x1="0" y1="500" x2="800" y2="500" stroke="#1a3a12" stroke-width="1.5" opacity="0.8"/>

  <!-- Ground subtle grid / dirt lines -->
  <g stroke="#0a1f08" stroke-width="0.8" opacity="0.5">
    <line x1="0" y1="530" x2="800" y2="530"/>
    <line x1="0" y1="560" x2="800" y2="560"/>
    <line x1="0" y1="590" x2="800" y2="590"/>
  </g>

  <!-- Gold horizon accent -->
  <line x1="0" y1="500" x2="800" y2="500" stroke="#FFD700" stroke-width="0.8" opacity="0.15"/>

  <!-- ===================== -->
  <!-- PLAYER CASTLE (left, half off-screen) -->
  <!-- Castle body: 120px wide, centered at x=-60 so right half (x=0..60) is visible -->
  <!-- Base sits on ground at y=500, castle top at y=260 -->
  <!-- ===================== -->
  <g>
    <!-- Main keep body -->
    <rect x="-60" y="300" width="120" height="200" fill="url(#stone)"/>

    <!-- Left tower (fully off screen) -->
    <rect x="-100" y="280" width="50" height="220" fill="url(#stone-dark)"/>
    <!-- Left tower battlements (off screen, skip) -->

    <!-- Right tower (partially visible) -->
    <rect x="30" y="270" width="50" height="230" fill="url(#stone-dark)"/>
    <!-- Right tower battlements -->
    <rect x="30"  y="258" width="10" height="16" fill="url(#stone-dark)"/>
    <rect x="43"  y="258" width="10" height="16" fill="url(#stone-dark)"/>
    <rect x="56"  y="258" width="10" height="16" fill="url(#stone-dark)"/>
    <rect x="69"  y="258" width="10" height="16" fill="url(#stone-dark)"/>

    <!-- Main keep battlements (partially visible at right edge) -->
    <rect x="-60" y="288" width="10" height="16" fill="url(#stone)"/>
    <rect x="-46" y="288" width="10" height="16" fill="url(#stone)"/>
    <rect x="-32" y="288" width="10" height="16" fill="url(#stone)"/>
    <rect x="-18" y="288" width="10" height="16" fill="url(#stone)"/>
    <rect x="-4"  y="288" width="10" height="16" fill="url(#stone)"/>
    <rect x="10"  y="288" width="10" height="16" fill="url(#stone)"/>
    <rect x="24"  y="288" width="10" height="16" fill="url(#stone)"/>

    <!-- Gate archway (off screen) -->
    <rect x="-35" y="400" width="30" height="100" fill="#000810"/>
    <ellipse cx="-20" cy="400" rx="15" ry="12" fill="#000810"/>

    <!-- Arrow slits on visible right tower -->
    <rect x="47" y="310" width="5" height="14" fill="#000810" opacity="0.9"/>
    <rect x="47" y="345" width="5" height="14" fill="#000810" opacity="0.9"/>
    <rect x="47" y="380" width="5" height="14" fill="#000810" opacity="0.9"/>
    <rect x="47" y="415" width="5" height="14" fill="#000810" opacity="0.9"/>

    <!-- Player banner (green) -->
    <rect x="36" y="248" width="4" height="28" fill="#335533"/>
    <polygon points="40,248 60,258 40,268" fill="#224422"/>

    <!-- Player window glow (blue-green) -->
    <circle cx="10" cy="370" r="8" fill="#003322" opacity="0.7"/>
    <circle cx="10" cy="370" r="4" fill="#005533" opacity="0.8"/>

    <!-- Stone outline strokes for depth -->
    <rect x="-60" y="300" width="120" height="200" fill="none" stroke="#0a0a1a" stroke-width="1"/>
    <rect x="30"  y="270" width="50"  height="230" fill="none" stroke="#0a0a1a" stroke-width="1"/>
  </g>

  <!-- ===================== -->
  <!-- ENEMY CASTLE (right, half off-screen) -->
  <!-- Castle body: 120px wide, centered at x=860 so left half (x=800..860) is visible,
       and left half of castle = x=800..860 means visible portion is x=740..800 -->
  <!-- Centered at x=860: body from x=800 to x=920. Right tower at x=910..960. Left tower at x=790..840 -->
  <!-- ===================== -->
  <g>
    <!-- Main keep body (centered at x=860, so x=800..920) -->
    <rect x="800" y="300" width="120" height="200" fill="url(#stone-dark)"/>

    <!-- Left tower (partially visible: x=750..800) -->
    <rect x="750" y="270" width="50" height="230" fill="url(#stone-dark)"/>
    <!-- Left tower battlements -->
    <rect x="750" y="258" width="10" height="16" fill="url(#stone-dark)"/>
    <rect x="763" y="258" width="10" height="16" fill="url(#stone-dark)"/>
    <rect x="776" y="258" width="10" height="16" fill="url(#stone-dark)"/>
    <rect x="789" y="258" width="10" height="16" fill="url(#stone-dark)"/>

    <!-- Main keep battlements (only leftmost visible) -->
    <rect x="800" y="288" width="10" height="16" fill="url(#stone-dark)"/>
    <rect x="814" y="288" width="10" height="16" fill="url(#stone-dark)"/>
    <rect x="828" y="288" width="10" height="16" fill="url(#stone-dark)"/>

    <!-- Right tower (fully off screen) -->
    <rect x="910" y="280" width="50" height="220" fill="url(#stone-dark)"/>

    <!-- Gate archway (off screen) -->
    <rect x="840" y="400" width="30" height="100" fill="#000408"/>
    <ellipse cx="855" cy="400" rx="15" ry="12" fill="#000408"/>

    <!-- Arrow slits on visible left tower -->
    <rect x="764" y="310" width="5" height="14" fill="#000408" opacity="0.9"/>
    <rect x="764" y="345" width="5" height="14" fill="#000408" opacity="0.9"/>
    <rect x="764" y="380" width="5" height="14" fill="#000408" opacity="0.9"/>
    <rect x="764" y="415" width="5" height="14" fill="#000408" opacity="0.9"/>

    <!-- Enemy banner (dark red/gold) -->
    <rect x="762" y="248" width="4" height="28" fill="#553322"/>
    <polygon points="762,248 742,258 762,268" fill="#442211"/>

    <!-- Enemy window glow (red) -->
    <circle cx="790" cy="370" r="8" fill="#330000" opacity="0.8"/>
    <circle cx="790" cy="370" r="4" fill="#660000" opacity="0.9"/>

    <!-- Stone outline strokes -->
    <rect x="800" y="300" width="120" height="200" fill="none" stroke="#080810" stroke-width="1"/>
    <rect x="750" y="270" width="50"  height="230" fill="none" stroke="#080810" stroke-width="1"/>
  </g>

  <!-- Vignette -->
  <rect width="800" height="600" fill="url(#vignette)"/>
</svg>
